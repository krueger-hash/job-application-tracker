spring.application.name=backend

# Pull the RDS-managed secret (JSON: { "username", "password" }) into properties.
# DB_SECRET_ARN is injected by the SAM template.
spring.config.import=aws-secretsmanager:${DB_SECRET_ARN}

# Build the JDBC URL from the host/port/name env vars (also injected by SAM).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${username}
spring.datasource.password=${password}

# Disable Docker Compose integration.
spring.docker.compose.enabled=false

spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.max-lifetime=60000
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

### prevent additional request which would fail during init phase
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

### flyway configuration
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true