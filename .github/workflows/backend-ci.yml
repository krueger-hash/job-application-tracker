name: Backend CI

# Validates every PR before it can merge. No AWS access, no deploy - just
# proves the code builds and tests pass.
on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore:
        - main

jobs:
  backend:
    name: Build & test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto      # Amazon's JDK 21 - matches the Lambda runtime
          java-version: '21'
          cache: maven
      - name: Build and test
        working-directory: backend
        run: mvn --batch-mode verify
