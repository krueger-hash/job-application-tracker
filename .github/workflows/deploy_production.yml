name: Release to prod

# Triggered by pushing a version tag (e.g. v0.1.0). It promotes the artifact
# for the tagged commit - which must already have been built & staged by
# publish-main (i.e. the tag points at a commit already on main). No rebuild:
# prod runs the exact same artifact that was validated in staging.
#
# Also keeps a manual trigger as an escape hatch / rollback path: dispatch with
# a specific SHA to promote an older build.
on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to promote (blank = latest staged). For rollback."
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ARTIFACT_BUCKET: job-application-tracker-artifacts-488347380584   # staging bucket (read cross-account)
  MAIN_CLASS: org.job.application.tracker.backend.BackendApplication

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production   # OIDC trust scoped here + the approval gate (once repo is public)
    steps:
      - name: Assume prod deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve which SHA to promote
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Tag push: promote the commit the tag points at.
            SHA="${GITHUB_SHA}"
            echo "Tag ${GITHUB_REF_NAME} -> commit $SHA"
          else
            # Manual dispatch: explicit SHA, or fall back to latest staged.
            SHA="${{ github.event.inputs.sha }}"
            [ -z "$SHA" ] && SHA="$(aws s3 cp "s3://$ARTIFACT_BUCKET/staged/latest" -)"
            echo "Manual promote -> commit $SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Verify the artifacts exist (must be built & staged first)
        run: |
          if ! aws s3 ls "s3://$ARTIFACT_BUCKET/builds/${{ steps.resolve.outputs.sha }}/packaged.yaml" >/dev/null 2>&1; then
            echo "::error::No published backend artifact for ${{ steps.resolve.outputs.sha }}. Tag a commit that's on main and already built by publish-main."
            exit 1
          fi
          if ! aws s3 ls "s3://$ARTIFACT_BUCKET/frontend/${{ steps.resolve.outputs.sha }}/index.html" >/dev/null 2>&1; then
            echo "::error::No published frontend artifact for ${{ steps.resolve.outputs.sha }}. Tag a commit that's on main and already built by publish-main."
            exit 1
          fi

      - name: Fetch the immutable artifact template (cross-account)
        run: |
          aws s3 cp \
            "s3://$ARTIFACT_BUCKET/builds/${{ steps.resolve.outputs.sha }}/packaged.yaml" \
            packaged.yaml

      - name: Deploy the same artifact to prod
        run: |
          aws cloudformation deploy \
            --template-file packaged.yaml \
            --stack-name job-application-tracker-app-production \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=production \
              BaseStackName=job-application-tracker-base-production \
              MainClass="$MAIN_CLASS"

      # ---- Promote the SAME frontend artifact to prod ----
      # No rebuild: copies the immutable frontend/<sha>/ build (in the staging
      # account's artifact bucket, readable cross-account via ArtifactBucketPolicy)
      # into the prod bucket, then invalidates the prod distribution. Runs after
      # the stack deploy so the bucket + distribution exist.
      - name: Resolve prod frontend targets
        id: fe
        run: |
          STACK=job-application-tracker-app-production
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"
      - name: Promote frontend to prod
        run: |
          aws s3 sync "s3://$ARTIFACT_BUCKET/frontend/${{ steps.resolve.outputs.sha }}/" \
            "s3://${{ steps.fe.outputs.bucket }}/" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude index.html
          aws s3 cp "s3://$ARTIFACT_BUCKET/frontend/${{ steps.resolve.outputs.sha }}/index.html" \
            "s3://${{ steps.fe.outputs.bucket }}/index.html" --cache-control "no-cache"
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.fe.outputs.dist }}" --paths "/*" >/dev/null