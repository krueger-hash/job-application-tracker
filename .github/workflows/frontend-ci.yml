name: Frontend CI

# Validates every PR before it can merge.
on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore:
      - main

jobs:
  frontend:
    name: Lint & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build (type-checks via tsc -b)
        working-directory: frontend
        run: npm run build
