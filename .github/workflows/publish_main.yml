name: Publish & deploy staging

# On every merge to main: build the artifact ONCE, store it immutably by commit
# SHA in the staging artifact bucket, deploy it to staging, and record it as the
# latest staged build (which prod promotion defaults to).
on:
  push:
    branches: [main]

permissions:
  id-token: write          # for GitHub OIDC
  contents: read

env:
  AWS_REGION: eu-central-1
  ARTIFACT_BUCKET: job-application-tracker-artifacts-488347380584   # staging account's bucket
  MAIN_CLASS: org.job.application.tracker.backend.BackendApplication

jobs:
  publish-and-stage:
    runs-on: ubuntu-latest
    environment: staging     # required: OIDC trust is scoped to environment:staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Assume staging deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Build the artifact ONCE ----
      - name: Build
        run: sam build -t infra/template.yaml

      # ---- Store it immutably, keyed by commit SHA ----
      # sam package uploads the Lambda code zip to the bucket and rewrites the
      # template's CodeUri to point at that S3 location. We then save the
      # rewritten ('packaged') template next to the code so prod can reuse the
      # exact same artifact later - no rebuild.
      - name: Package & publish artifact
        run: |
          sam package -t .aws-sam/build/template.yaml \
            --s3-bucket "$ARTIFACT_BUCKET" \
            --s3-prefix "builds/${GITHUB_SHA}" \
            --output-template-file packaged.yaml
          aws s3 cp packaged.yaml "s3://$ARTIFACT_BUCKET/builds/${GITHUB_SHA}/packaged.yaml"

      # ---- Deploy that artifact to staging ----
      - name: Deploy to staging
        run: |
          aws cloudformation deploy \
            --template-file packaged.yaml \
            --stack-name job-application-tracker-app-staging \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=staging \
              BaseStackName=job-application-tracker-base-staging \
              MainClass="$MAIN_CLASS"

      # ---- Record this SHA as the latest staged build ----
      - name: Mark staged
        run: |
          printf '%s' "$GITHUB_SHA" | aws s3 cp - "s3://$ARTIFACT_BUCKET/staged/${GITHUB_SHA}"
          printf '%s' "$GITHUB_SHA" | aws s3 cp - "s3://$ARTIFACT_BUCKET/staged/latest"
          echo "Published and staged $GITHUB_SHA"
