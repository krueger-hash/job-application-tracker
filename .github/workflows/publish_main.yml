name: Publish & deploy staging

# On every merge to main: build the artifact ONCE, store it immutably by commit
# SHA in the staging artifact bucket, deploy it to staging, and record it as the
# latest staged build (which prod promotion defaults to).
on:
  push:
    branches: [main]

permissions:
  id-token: write          # for GitHub OIDC
  contents: read

env:
  AWS_REGION: eu-central-1
  ARTIFACT_BUCKET: job-application-tracker-artifacts-488347380584   # staging account's bucket
  MAIN_CLASS: org.job.application.tracker.backend.BackendApplication

jobs:
  publish-and-stage:
    runs-on: ubuntu-latest
    environment: staging     # required: OIDC trust is scoped to environment:staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Assume staging deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Build the artifact ONCE ----
      - name: Build
        run: sam build -t infra/template.yaml

      # ---- Store it immutably, keyed by commit SHA ----
      # sam package uploads the Lambda code zip to the bucket and rewrites the
      # template's CodeUri to point at that S3 location. We then save the
      # rewritten ('packaged') template next to the code so prod can reuse the
      # exact same artifact later - no rebuild.
      - name: Package & publish artifact
        run: |
          sam package -t .aws-sam/build/template.yaml \
            --s3-bucket "$ARTIFACT_BUCKET" \
            --s3-prefix "builds/${GITHUB_SHA}" \
            --output-template-file packaged.yaml
          aws s3 cp packaged.yaml "s3://$ARTIFACT_BUCKET/builds/${GITHUB_SHA}/packaged.yaml"

      # ---- Build the frontend ONCE and store it immutably by SHA ----
      # The Vite build is fully environment-agnostic (it calls /api/* on its own
      # origin via the CloudFront proxy), so the SAME build can be promoted to
      # prod later — exactly like the backend artifact above.
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Publish frontend artifact
        run: |
          aws s3 sync frontend/dist/ "s3://$ARTIFACT_BUCKET/frontend/${GITHUB_SHA}/" --delete

      # ---- Deploy that artifact to staging ----
      - name: Deploy to staging
        run: |
          aws cloudformation deploy \
            --template-file packaged.yaml \
            --stack-name job-application-tracker-app-staging \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=staging \
              BaseStackName=job-application-tracker-base-staging \
              MainClass="$MAIN_CLASS"

      # ---- Deploy the frontend artifact to staging ----
      # Runs after the stack deploy so the bucket + distribution exist. Reads
      # their names from the stack outputs (nothing hardcoded), then promotes the
      # immutable frontend/<sha>/ artifact into the bucket and invalidates the CDN.
      - name: Resolve staging frontend targets
        id: fe
        run: |
          STACK=job-application-tracker-app-staging
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"
      - name: Deploy frontend to staging
        run: |
          # Hashed assets cache forever; index.html stays uncached (see deploy-frontend.sh).
          aws s3 sync "s3://$ARTIFACT_BUCKET/frontend/${GITHUB_SHA}/" \
            "s3://${{ steps.fe.outputs.bucket }}/" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude index.html
          aws s3 cp "s3://$ARTIFACT_BUCKET/frontend/${GITHUB_SHA}/index.html" \
            "s3://${{ steps.fe.outputs.bucket }}/index.html" --cache-control "no-cache"
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.fe.outputs.dist }}" --paths "/*" >/dev/null

      # ---- Record this SHA as the latest staged build ----
      - name: Mark staged
        run: |
          printf '%s' "$GITHUB_SHA" | aws s3 cp - "s3://$ARTIFACT_BUCKET/staged/${GITHUB_SHA}"
          printf '%s' "$GITHUB_SHA" | aws s3 cp - "s3://$ARTIFACT_BUCKET/staged/latest"
          echo "Published and staged $GITHUB_SHA"
