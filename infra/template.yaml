AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Application stack for job-application-tracker: the Spring Boot Java Lambda
  (via aws-serverless-java-container) behind an HTTP API, attached to the VPC
  so it can reach RDS. Imports VPC + DB values from the base stack.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]

  BaseStackName:
    Type: String
    Description: Name of the base stack to import VPC/DB exports from.

  MainClass:
    Type: String
    # >>> SET THIS to your @SpringBootApplication class's fully-qualified name,
    Default: org.job.application.tracker.backend.BackendApplication
    Description: FQN of your @SpringBootApplication class (MAIN_CLASS).

  CloudFrontPriceClass:
    Type: String
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]
    Default: PriceClass_100   # Cheapest: edge locations in North America + Europe only.
    Description: CloudFront price class (which edge locations serve the SPA).

  UseLocalStack:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Set to 'true' when deploying to LocalStack. The frontend (S3 + CloudFront)
      is then SKIPPED: LocalStack's SAM transform can't resolve the implicit
      HTTP API / OAC that the CDN depends on, and static hosting + a CDN are a
      real-AWS concern anyway. On real AWS this stays 'false' and the frontend
      deploys normally. Mirrors the same-named flag in base/template.yaml.

Conditions:
  # Frontend/CDN only makes sense on real AWS; skip it on LocalStack.
  DeployFrontend: !Equals [!Ref UseLocalStack, 'false']

Globals:
  Function:
    Runtime: java21
    MemorySize: 1024            # Java/Spring likes headroom; raise to 1536/2048 if cold starts hurt.
    Timeout: 30
    Architectures: [x86_64]     # SnapStart's most broadly-supported arch - keep x86_64.
    Tracing: Active

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Environment}-job-tracker-api'
      CodeUri: ../backend                # backend/ - the dir containing pom.xml; sam build runs Maven here.
      # The generic Spring Boot adapter handler. It boots your app via MAIN_CLASS.
      Handler: com.amazonaws.serverless.proxy.spring.SpringDelegatingLambdaContainerHandler

      # SnapStart - the Java cold-start fix. Needs a published version, which
      # AutoPublishAlias provides.
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions # TODO: Snapstart needs additional logic to work with spring boot correctly - PublishedVersions

      # Attach to the VPC so the Lambda can reach RDS privately.
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${BaseStackName}-PrivateSubnet1Id'
          - Fn::ImportValue: !Sub '${BaseStackName}-PrivateSubnet2Id'
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${BaseStackName}-LambdaSecurityGroupId'

      Environment:
        Variables:
          MAIN_CLASS: !Ref MainClass
          SPRING_PROFILES_ACTIVE: !Ref Environment
          # DB wiring. The RDS-managed secret holds only username + password,
          # so the host/port/name are passed separately. Your Spring datasource
          # config reads the secret for credentials and builds the JDBC URL from
          # DB_HOST / DB_PORT / DB_NAME.
          DB_SECRET_ARN:
            Fn::ImportValue: !Sub '${BaseStackName}-DbSecretArn'
          DB_HOST:
            Fn::ImportValue: !Sub '${BaseStackName}-DbEndpointAddress'
          DB_NAME:
            Fn::ImportValue: !Sub '${BaseStackName}-DbName'
          DB_PORT:
            Fn::ImportValue: !Sub '${BaseStackName}-DbEndpointPort'

      Policies:
        # Inline statement instead of the AWSSecretsManagerGetSecretValuePolicy
        # managed template: the template expands to an Fn::Sub with an inline
        # variable binding that LocalStack's SAM transform mishandles
        # ("Unresolved resource dependencies [secretArn]"). This form is
        # equivalent and deploys identically on real AWS and LocalStack.
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                Fn::ImportValue: !Sub '${BaseStackName}-DbSecretArn'

      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # Frontend: the React single-page app, hosted as static files in a PRIVATE S3
  # bucket and served through CloudFront. CloudFront also proxies /api/* to the
  # backend HTTP API, so the SPA and the API share one domain (no CORS, and the
  # API URL never needs to be baked into the build).

  # Private bucket holding the built SPA assets. No public access — CloudFront
  # reads it via Origin Access Control (OAC) below; nothing is reachable
  # directly over the S3 URL.
  FrontendBucket:
    Type: AWS::S3::Bucket
    Condition: DeployFrontend
    # The bucket holds only build output (regenerated by CI on every deploy),
    # so deleting it with the stack is safe and keeps teardown clean.
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      # Bucket names are globally unique → scope by env + account id.
      BucketName: !Sub '${Environment}-job-tracker-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-job-tracker-frontend' }

  # Origin Access Control: the modern (SigV4) replacement for Origin Access
  # Identity. Lets ONLY this CloudFront distribution read the private bucket.
  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: DeployFrontend
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-job-tracker-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # The backend HTTP API serves its routes at the ROOT (e.g. GET /), not under
  # an /api prefix. This viewer-request function strips the public "/api" prefix
  # before CloudFront forwards to the API origin, so /api/foo -> /foo.
  ApiRewriteFunction:
    Type: AWS::CloudFront::Function
    Condition: DeployFrontend
    Properties:
      Name: !Sub '${Environment}-job-tracker-api-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Strip the /api prefix before forwarding to the HTTP API origin.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          request.uri = request.uri.replace(/^\/api/, '');
          if (request.uri === '') { request.uri = '/'; }
          return request;
        }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Condition: DeployFrontend
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${Environment} job-application-tracker SPA + API proxy'
        # The SPA's entry point for requests to the root path.
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref CloudFrontPriceClass

        Origins:
          # 1) Static SPA assets in the private S3 bucket, read via OAC.
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''   # empty: we use OAC, not the legacy OAI
          # 2) The backend HTTP API, reached over HTTPS as a custom origin.
          - Id: ApiOrigin
            DomainName: !Sub '${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]

        # Default: everything not matched below is the SPA, served from S3.
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          # AWS managed "CachingOptimized" policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

        CacheBehaviors:
          # API traffic: forward to the backend, never cache, pass through all
          # viewer headers/query strings/cookies (except Host, so API Gateway
          # sees its own hostname), and rewrite away the /api prefix.
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            # AWS managed "CachingDisabled" policy.
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            # AWS managed "AllViewerExceptHostHeader" origin request policy.
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ApiRewriteFunction.FunctionMetadata.FunctionARN

        # SPA routing: client-side routes (e.g. /applications/42) don't exist as
        # S3 objects, so S3 returns 403/404. Serve index.html with a 200 instead
        # and let the React router handle the path.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

        ViewerCertificate:
          # Default *.cloudfront.net cert. Swap for an ACM cert (us-east-1) +
          # Aliases once a custom domain is wired up.
          CloudFrontDefaultCertificate: true

  # Grant ONLY this distribution permission to read the private bucket. The
  # SourceArn condition scopes it to this exact distribution.
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: DeployFrontend
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

Outputs:
  ApiUrl:
    Description: Base URL of the HTTP API (feed this to the React app later).
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  ApiUrlLocalStack:
    Description: Base URL of the HTTP API (feed this to the React app later).
    Value: !Sub 'http://localhost:4566/_aws/execute-api/${ServerlessHttpApi}/'

  FrontendBucketName:
    Condition: DeployFrontend
    Description: S3 bucket that holds the built SPA. CI syncs the build output here.
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Condition: DeployFrontend
    Description: Distribution ID. CI uses it to create cache invalidations after a deploy.
    Value: !Ref Distribution

  CloudFrontDomainName:
    Condition: DeployFrontend
    Description: Public URL of the app. Static assets + /api/* (proxied to the HTTP API).
    Value: !Sub 'https://${Distribution.DomainName}'
