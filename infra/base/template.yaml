AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Base infrastructure for job-application-tracker: a fully private VPC, RDS
  PostgreSQL, and the VPC endpoints needed so a VPC-attached Lambda can reach
  AWS services WITHOUT a NAT Gateway. Deploy once per environment. The app
  (SAM) stack imports the exported values from here.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Used for naming and tagging.

  DBName:
    Type: String
    Default: jobtracker
    Description: Initial database name.

  MasterUsername:
    Type: String
    Default: appadmin
    Description: RDS master username (password is generated + stored in Secrets Manager).

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro      # Free-tier eligible (750 hrs/month for 12 months).
    Description: RDS instance size.

  UseLocalStack:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Set to 'true' when deploying to LocalStack. LocalStack's RDS does not
      implement ManageMasterUserPassword / MasterUserSecret, so we create the
      credentials secret ourselves and feed the password into RDS. On real AWS
      this stays 'false' and RDS manages the secret natively.

Conditions:
  # When true, this stack creates its own Secrets Manager secret instead of
  # relying on RDS-managed credentials (which LocalStack can't produce).
  SelfManagedSecret: !Equals [!Ref UseLocalStack, 'true']

Resources:
  # ---------------------------------------------------------------------------
  # Network: a VPC with two PRIVATE subnets (RDS needs >=2 AZs). No internet
  # gateway, no NAT — nothing in here talks to the public internet. The Lambda
  # reaches AWS services through the VPC endpoints below instead.
  # ---------------------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true       # required for interface-endpoint private DNS
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-vpc' }

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-private-1' }

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-private-2' }

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-private-rt' }

  Subnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  Subnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # Security groups
  # ---------------------------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG for the VPC-attached Lambda.
      VpcId: !Ref Vpc
      # A custom SG denies all egress by default, so we must allow it. The VPC
      # has no internet route, so allow-all only actually reaches RDS + the
      # endpoints. Tighten to specific ports/SGs later if you like.
      SecurityGroupEgress:
        - { IpProtocol: '-1', CidrIp: 0.0.0.0/0 }
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-lambda-sg' }

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG for RDS. Only the Lambda may connect on 5432.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-rds-sg' }

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG for interface endpoints. HTTPS from the Lambda only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-endpoint-sg' }

  # ---------------------------------------------------------------------------
  # VPC endpoints (the no-NAT magic)
  # ---------------------------------------------------------------------------
  # S3 gateway endpoint — FREE. Attaches to the route table.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRouteTable]

  # Secrets Manager interface endpoint — so the Lambda can read DB creds at
  # runtime. This is the one recurring cost in the no-NAT design (~$0.01/hr per
  # AZ). Placed in ONE subnet to keep it cheap; add PrivateSubnet2 for HA.
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS.
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  # LocalStack-only: a self-managed credentials secret with the SAME JSON shape
  # RDS produces for ManageMasterUserPassword ({ "username", "password" }), so
  # Spring's aws-secretsmanager config import works unchanged. Not created on
  # real AWS (Condition), where RDS manages its own secret.
  DbSecret:
    Type: AWS::SecretsManager::Secret
    Condition: SelfManagedSecret
    Properties:
      Name: !Sub '${Environment}-job-tracker-db-credentials'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${MasterUsername}"}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludePunctuation: true   # keep it simple for a JDBC URL / RDS password rules

  Database:
    Type: AWS::RDS::DBInstance
    # DELETE removes the DB (and its data) when the stack is torn down — handy
    # for a learning project + clean teardown. Change to Snapshot/Retain once
    # the data matters.
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      # EngineVersion intentionally omitted → RDS uses its current default,
      # which avoids "version not available" deploy failures. Pin it later.
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: '20'          # free-tier includes 20 GB
      StorageType: gp3
      StorageEncrypted: true
      DBName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      # Real AWS: let RDS generate + manage the password in Secrets Manager.
      # LocalStack: feed the password from our self-managed DbSecret instead
      # (ManageMasterUserPassword is unsupported there). The two properties are
      # mutually exclusive, so each path supplies exactly one via AWS::NoValue.
      ManageMasterUserPassword: !If [SelfManagedSecret, !Ref 'AWS::NoValue', true]
      MasterUserPassword: !If
        - SelfManagedSecret
        - !Sub '{{resolve:secretsmanager:${DbSecret}:SecretString:password}}'
        - !Ref 'AWS::NoValue'
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref RdsSecurityGroup]
      Tags:
        - { Key: Name, Value: !Sub '${Environment}-postgres' }

# -----------------------------------------------------------------------------
# Exports — the app (SAM) stack imports these. Export names are prefixed with
# this stack's name, so set the app's BaseStackName parameter to match it.
# -----------------------------------------------------------------------------
Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: !Sub '${AWS::StackName}-VpcId' }

  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export: { Name: !Sub '${AWS::StackName}-PrivateSubnet1Id' }

  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export: { Name: !Sub '${AWS::StackName}-PrivateSubnet2Id' }

  LambdaSecurityGroupId:
    Value: !Ref LambdaSecurityGroup
    Export: { Name: !Sub '${AWS::StackName}-LambdaSecurityGroupId' }

  DbSecretArn:
    Description: ARN of the DB credentials secret (RDS-managed on AWS, self-managed on LocalStack).
    Value: !If
      - SelfManagedSecret
      - !Ref DbSecret
      - !GetAtt Database.MasterUserSecret.SecretArn
    Export: { Name: !Sub '${AWS::StackName}-DbSecretArn' }

  DbEndpointAddress:
    Value: !GetAtt Database.Endpoint.Address
    Export: { Name: !Sub '${AWS::StackName}-DbEndpointAddress' }

  DbEndpointPort:
    # On real AWS this is 5432; on LocalStack RDS is exposed on a dynamically
    # assigned port (4510-4559 range), so the app stack must import this rather
    # than hardcode 5432.
    Value: !GetAtt Database.Endpoint.Port
    Export: { Name: !Sub '${AWS::StackName}-DbEndpointPort' }

  DbName:
    Value: !Ref DBName
    Export: { Name: !Sub '${AWS::StackName}-DbName' }